version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline
        - cd amplify/functions && for dir in */; do cd "$dir" && npm install && cd ..; done && cd ../..
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - git status
        - git ls-files shared/ | head -20
        - ls -la shared/
        - ls -la shared/races/ || echo "races directory not found"
        - cp amplify_outputs.json frontend/
        - mkdir -p frontend/shared
        - cp -r shared/* frontend/shared/
        - ls -la frontend/shared/ || echo "frontend/shared not found after copy"
        - ls -la frontend/shared/races/ || echo "frontend/shared/races not found after copy"
        - cd frontend
        - pwd
        - ls -la shared/ || echo "shared not found in frontend directory"
        - npm install --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - .npm/**/*
