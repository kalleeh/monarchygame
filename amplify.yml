version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - ls -la
            - pwd
            - cd frontend && npm ci
        build:
          commands:
            - pwd
            - ls -la frontend
            - npm run build --prefix frontend
      artifacts:
        baseDirectory: frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
