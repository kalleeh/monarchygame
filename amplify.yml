version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            # Install root deps for ampx CLI
            - npm install
            # Always deploy the backend. CDK/CloudFormation is idempotent, so a
            # frontend-only commit is a fast no-op. The previous `HEAD~1 HEAD`
            # gate silently SKIPPED the backend deploy whenever a push's TOP
            # commit was frontend-only (e.g. the backend change sat in HEAD~1),
            # shipping a frontend that called not-yet-deployed APIs. Correctness
            # over the minute saved.
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
            - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
            - cp amplify_outputs.json frontend/amplify_outputs.json
            - npm install --prefix frontend
        build:
          commands:
            - npm run build --prefix frontend
      artifacts:
        baseDirectory: frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    # CORS: production domain only. Preview branches use Amplify's built-in CORS handling.
    customHeaders:
      - pattern: '**/*'
        headers:
          - key: 'Access-Control-Allow-Origin'
            value: 'https://monarchy.gurum.se'
          - key: 'Access-Control-Allow-Methods'
            value: 'GET, POST, PUT, DELETE, OPTIONS'
          - key: 'Access-Control-Allow-Headers'
            value: 'Content-Type, Authorization'
